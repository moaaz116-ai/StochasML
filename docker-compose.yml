version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_APP_NAME=Stochas ML
    depends_on:
      - api
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
      - DATABASE_URL=sqlite:///./data/db/stochas_ml.db
      - STORAGE_DIR=./data/artifacts
      - CORS_ORIGINS=*
      - LOG_LEVEL=INFO
    volumes:
      - stochas_db:/app/data/db
      - stochas_artifacts:/app/data/artifacts
    restart: unless-stopped

volumes:
  stochas_db:
  stochas_artifacts:
