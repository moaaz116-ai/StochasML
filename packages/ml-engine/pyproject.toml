[project]
name = "infera-ml"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "numpy>=1.26.0",
    "scikit-learn>=1.4.0",
    "jinja2>=3.1.0",
]

[project.optional-dependencies]
tf = ["tensorflow>=2.16.0"]
test = ["pytest>=8.0.0", "pytest-cov>=6.0.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/infera_ml"]
